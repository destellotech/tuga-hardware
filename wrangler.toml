name = "tuga-hardware"
main = "src/worker.js"
compatibility_date = "2024-09-27"
compatibility_flags = ["nodejs_compat"]

# Static assets served from the project root (HTML, CSS, JS, images)
assets = { directory = "./" }

[vars]
SITE_URL = "https://tugahardware.com"
SITE_NAME = "Tuga Hardware"

# KV namespace for order storage
[[kv_namespaces]]
binding = "ORDERS"
id = "dc341cf8ff2b4a2fb6f82c4be084bb7a"

# Secrets (set via CLI, never commit these):
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put PAYPAL_CLIENT_ID
#   wrangler secret put PAYPAL_CLIENT_SECRET
#   wrangler secret put RESEND_API_KEY
